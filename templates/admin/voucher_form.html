{% extends "admin/base.html" %}

{% block title %}{{ 'Sửa voucher' if voucher else 'Thêm voucher' }}{% endblock %}

{% block content %}
<div style="max-width:700px;">
    <h2 style="margin-bottom:25px;">{{ '✏️ Sửa voucher' if voucher else '➕ Thêm voucher mới' }}</h2>

    <form method="POST" style="background:white;padding:30px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.1);">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;">
            <div class="form-group">
                <label>Mã voucher *</label>
                <input type="text" name="code" class="form-control" value="{{ voucher.code if voucher else '' }}" required placeholder="VD: SALE50K">
            </div>
            <div class="form-group">
                <label>Loại giảm giá</label>
                <select name="discount_type" class="form-control">
                    <option value="percent" {% if voucher and voucher.discount_type == 'percent' %}selected{% endif %}>Phần trăm (%)</option>
                    <option value="fixed" {% if voucher and voucher.discount_type == 'fixed' %}selected{% endif %}>Số tiền cố định (VNĐ)</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label>Mô tả</label>
            <input type="text" name="description" class="form-control" value="{{ voucher.description if voucher else '' }}" placeholder="VD: Giảm 50K cho đơn từ 500K">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:15px;">
            <div class="form-group">
                <label>Giá trị giảm</label>
                <input type="number" name="discount_value" class="form-control" value="{{ voucher.discount_value if voucher else '0' }}" min="0" step="0.01">
            </div>
            <div class="form-group">
                <label>Đơn tối thiểu (VNĐ)</label>
                <input type="number" name="min_order" class="form-control" value="{{ voucher.min_order if voucher else '0' }}" min="0">
            </div>
            <div class="form-group">
                <label>Giảm tối đa (VNĐ)</label>
                <input type="number" name="max_discount" class="form-control" value="{{ voucher.max_discount if voucher else '0' }}" min="0">
            </div>
        </div>
        <div class="form-group">
            <label>Áp dụng cho sản phẩm</label>
            <select name="product_id" class="form-control">
                <option value="">-- Tất cả sản phẩm --</option>
                {% for p in products %}
                <option value="{{ p.id }}" {% if voucher and voucher.product_id == p.id %}selected{% endif %}>{{ p.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group form-check">
            <input type="checkbox" name="is_active" id="is_active" {% if not voucher or voucher.is_active %}checked{% endif %}>
            <label for="is_active">Kích hoạt</label>
        </div>
        <div style="display:flex;gap:10px;margin-top:20px;">
            <button type="submit" class="btn btn-primary btn-lg">{{ '💾 Cập nhật' if voucher else '➕ Thêm voucher' }}</button>
            <a href="{{ url_for('admin_vouchers') }}" class="btn btn-outline btn-lg">Hủy</a>
        </div>
    </form>
</div>
{% endblock %}
